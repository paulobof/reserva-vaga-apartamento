<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}iCond - Reservas{% endblock %}</title>
    <style>
        :root {
            --primary: #1B6AC4;
            --primary-dark: #155CA0;
            --primary-light: #E8F1FB;
            --danger: #DC3545;
            --danger-dark: #B72C3A;
            --warning: #E67E22;
            --warning-dark: #CF6D17;
            --success: #198754;
            --success-light: #D1F2E0;
            --text: #1E293B;
            --text-secondary: #64748B;
            --bg: #F1F5F9;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
            --border-focus: #1B6AC4;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,.1);
            --radius: 8px;
            --radius-lg: 12px;
            --transition: 150ms ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* Header */
        .header {
            background: var(--primary);
            color: #fff;
            padding: 0 20px;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .header-brand {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-brand:hover { opacity: .9; text-decoration: none; }
        .header-badge {
            font-size: 11px;
            background: rgba(255,255,255,.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* Main content */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        /* Typography */
        h1 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
        h2 { font-size: 17px; font-weight: 600; color: var(--text); margin: 0 0 16px; }
        a { color: var(--primary); text-decoration: none; transition: color var(--transition); }
        a:hover { color: var(--primary-dark); }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .card-header h2 { margin: 0; }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: end;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .3px;
        }
        .form-group .optional {
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            color: #94A3B8;
            font-size: 12px;
        }

        select, input[type="date"], input[type="text"] {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: #fff;
            color: var(--text);
            transition: border-color var(--transition), box-shadow var(--transition);
            width: 100%;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(27,106,196,.15);
        }
        select:hover, input[type="date"]:hover, input[type="text"]:hover {
            border-color: #CBD5E1;
        }

        /* Buttons */
        button, .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all var(--transition);
            white-space: nowrap;
        }
        button:active, .btn:active { transform: scale(.97); }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 2px 8px rgba(27,106,196,.3); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: var(--danger-dark); }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-warning:hover { background: var(--warning-dark); }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn-icon { padding: 6px 10px; }
        button:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        /* Tables */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; font-size: 14px; }
        th {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: .4px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td { border-bottom: 1px solid #F1F5F9; }
        tbody tr { transition: background var(--transition); }
        tbody tr:hover { background: #F8FAFC; }
        tbody tr:last-child td { border-bottom: none; }

        /* Detail table (key-value) */
        .detail-table th {
            text-transform: none;
            letter-spacing: 0;
            font-size: 14px;
            color: var(--text-secondary);
            border-bottom: 1px solid #F1F5F9;
            width: 140px;
            vertical-align: top;
        }
        .detail-table td {
            font-weight: 500;
            color: var(--text);
        }

        /* Status badges */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .2px;
            text-transform: capitalize;
        }
        .status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-pending::before { background: #F59E0B; }
        .status-scheduled { background: var(--primary-light); color: #1E40AF; }
        .status-scheduled::before { background: var(--primary); }
        .status-executing { background: #FFF7ED; color: #9A3412; }
        .status-executing::before { background: var(--warning); animation: pulse 1.5s infinite; }
        .status-success { background: var(--success-light); color: #166534; }
        .status-success::before { background: var(--success); }
        .status-failed { background: #FEE2E2; color: #991B1B; }
        .status-failed::before { background: var(--danger); }
        .status-cancelled { background: #F1F5F9; color: #64748B; }
        .status-cancelled::before { background: #94A3B8; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        /* Actions */
        .actions { display: flex; gap: 6px; align-items: center; }
        .actions form { margin: 0; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state svg { margin-bottom: 12px; opacity: .4; }
        .empty-state p { font-size: 15px; }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 16px;
            transition: color var(--transition);
        }
        .back-link:hover { color: var(--primary); }
        .back-link svg { width: 16px; height: 16px; }

        /* Toast notifications */
        .toast {
            position: fixed;
            top: 72px;
            right: 20px;
            padding: 14px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            z-index: 200;
            animation: slideIn .3s ease, fadeOut .3s ease 3s forwards;
            max-width: 400px;
        }
        .toast-success { background: var(--success-light); color: #166534; border: 1px solid #A7F3D0; }
        .toast-error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Confirm dialog */
        .dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .dialog-overlay.active { display: flex; }
        .dialog {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 28px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
        }
        .dialog h3 { font-size: 18px; margin-bottom: 8px; }
        .dialog p { color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }
        .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }

        /* Attempt log styles */
        .log-success { color: var(--success); }
        .log-error { color: var(--danger); font-size: 13px; }
        .log-snippet { color: var(--text-secondary); font-size: 13px; }

        /* Info row */
        .info-actions {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            main { padding: 16px 12px 32px; }
            .card { padding: 16px; }
            .form-grid { grid-template-columns: 1fr; }
            h1 { font-size: 20px; }
            th, td { padding: 10px 8px; font-size: 13px; }
            .header-badge { display: none; }
        }

        @media (max-width: 480px) {
            .actions { flex-direction: column; }
            .status { font-size: 11px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="header-brand">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                iCond
                <span class="header-badge">Reservas</span>
            </a>
        </div>
    </header>
    <main>
        {% if flash_message %}
        <div class="toast toast-{{ flash_type or 'success' }}">{{ flash_message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <div class="dialog-overlay" id="confirmDialog">
        <div class="dialog">
            <h3 id="dialogTitle">Confirmar</h3>
            <p id="dialogMessage">Tem certeza?</p>
            <div class="dialog-actions">
                <button class="btn-outline btn-sm" onclick="closeDialog()">Voltar</button>
                <form id="dialogForm" method="post">
                    <button type="submit" class="btn-danger btn-sm" id="dialogConfirmBtn">Confirmar</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    function confirmAction(url, title, message) {
        document.getElementById('dialogTitle').textContent = title;
        document.getElementById('dialogMessage').textContent = message;
        document.getElementById('dialogForm').action = url;
        document.getElementById('confirmDialog').classList.add('active');
    }
    function closeDialog() {
        document.getElementById('confirmDialog').classList.remove('active');
    }
    document.getElementById('confirmDialog').addEventListener('click', function(e) {
        if (e.target === this) closeDialog();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDialog();
    });
    document.querySelectorAll('form.submit-form').forEach(function(form) {
        form.addEventListener('submit', function() {
            var btn = form.querySelector('button[type="submit"]');
            if (btn) { btn.disabled = true; btn.textContent = 'Aguarde...'; }
        });
    });
    </script>
</body>
</html>
